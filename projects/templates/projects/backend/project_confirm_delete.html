{% extends "projects/backend/base.html" %}

{% block title %}Delete Project{% endblock %}

{% block content %}
    <style>
        .delete-wrap {
            display: grid;
            gap: 1rem;
            max-width: 640px;
        }

        .delete-title {
            margin: 0;
            font-size: 1.3rem;
        }

        .delete-note {
            margin: 0;
            color: #5d554b;
            line-height: 1.45;
        }

        .code {
            background: #f4efe7;
            border: 1px solid #d8cfbf;
            border-radius: 8px;
            padding: 0.5rem 0.7rem;
            font-family: "Menlo", "Consolas", monospace;
            width: fit-content;
        }

        .delete-actions {
            display: flex;
            gap: 0.65rem;
            flex-wrap: wrap;
        }
    </style>

    <form method="post" class="delete-wrap">
        {% csrf_token %}
        <h2 class="delete-title">Delete Project</h2>
        <p class="delete-note">
            The following project will be permanently deleted:
        </p>
        <div class="code">/{{ object.owner.handle }}/{{ object.slug }}</div>
        <p class="delete-note">
            This action cannot be undone.
        </p>

        <div class="delete-actions">
            <button class="btn btn-danger" type="submit">Yes, Delete</button>
            <a class="btn btn-secondary" href="{% url 'projects:backend-project-list' %}">Cancel</a>
        </div>
    </form>
{% endblock %}
